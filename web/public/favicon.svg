<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Hexagon Background for a futuristic tech look -->
  <polygon points="50,5 90,25 90,75 50,95 10,75 10,25" fill="#0F172A" />
  <polygon points="50,5 90,25 90,75 50,95 10,75 10,25" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="10,4" opacity="0.5"/>

  <!-- Inner glowing circle representing the 'global sensor array' -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="2,6" opacity="0.6"/>

  <!-- The Core Cloud Icon (Lucide-inspired) -->
  <path d="M40,65 a12,12 0 0,1 0,-24 a16,16 0 0,1 30,-4 a10,10 0 0,1 0,20 h-30 z" fill="url(#cloudGrad)" stroke="#E0F2FE" stroke-width="2" />
  
  <!-- Digital/Radar Lines sweeping over -->
  <path d="M10,50 L50,50" stroke="#0EA5E9" stroke-width="1" opacity="0.3" />
  <path d="M50,10 L50,50" stroke="#0EA5E9" stroke-width="1" opacity="0.3" />
  
  <!-- Emerald Pulse Dot for 'Live Status' -->
  <circle cx="70" cy="35" r="5" fill="url(#pulseGrad)" filter="url(#glow)"/>
  
  <!-- Corner nodes -->
  <circle cx="10" cy="25" r="1.5" fill="#0EA5E9"/>
  <circle cx="90" cy="75" r="1.5" fill="#0EA5E9"/>
  <circle cx="90" cy="25" r="1.5" fill="#0EA5E9"/>
  <circle cx="10" cy="75" r="1.5" fill="#0EA5E9"/>
</svg>